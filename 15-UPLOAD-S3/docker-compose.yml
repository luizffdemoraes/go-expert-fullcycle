services:
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-26-41Z
    container_name: upload-s3-minio
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console Web
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Cria o bucket automaticamente ao subir (opcional)
  minio-init:
    image: minio/mc:RELEASE.2024-11-07T00-26-41Z
    container_name: upload-s3-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/goexpert-bucket-exemplo --ignore-existing;
      mc anonymous set download myminio/goexpert-bucket-exemplo;
      exit 0;
      "

volumes:
  minio_data:
